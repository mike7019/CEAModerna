services:
  postgres:
    image: postgres:16-alpine
    container_name: ceamoderna_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ceamoderna
      POSTGRES_PASSWORD: ceamoderna_pass
      POSTGRES_DB: ceamoderna
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ceamoderna -d ceamoderna"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ceamoderna_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Carga NEXTAUTH_SECRET, GMAIL_USER y GMAIL_APP_PASSWORD desde .env.local
    env_file:
      - .env.local
    environment:
      # Sobreescribe DATABASE_URL para usar el nombre del servicio Docker (no localhost)
      DATABASE_URL: postgresql://ceamoderna:ceamoderna_pass@postgres:5432/ceamoderna
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
